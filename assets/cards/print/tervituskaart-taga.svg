<?xml version="1.0" encoding="UTF-8"?>
<!-- SUKODA Tervituskaart - Tagapool
     Puhas formaat: A6 maastik (148x105 mm) + 3mm bleed = 154x111 mm
     CMYK | PDF | 3mm bleed | Lõikemärke EI lisata
     Trükitud pool: emotsionaalne lause + sukoda.ee
     NB! Fondid tuleb enne PDF-i tegemist outlined'ida (Convert to Outlines)
-->
<svg width="154mm" height="111mm" viewBox="0 0 154 111" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&amp;family=Inter:wght@300&amp;display=swap');
    </style>
  </defs>

  <rect width="154" height="111" fill="#FFFFFF"/>

  <!-- Quote -->
  <text x="77" y="50" 
        font-family="'Cormorant Garamond', Georgia, serif" 
        font-size="10"
        font-weight="300"
        font-style="italic"
        fill="#B8976A" 
        text-anchor="middle">Tulid koju.</text>
  <text x="77" y="63" 
        font-family="'Cormorant Garamond', Georgia, serif" 
        font-size="10"
        font-weight="300"
        font-style="italic"
        fill="#B8976A" 
        text-anchor="middle">K&#xF5;ik on korras.</text>

  <!-- sukoda.ee -->
  <text x="77" y="103" 
        font-family="'Inter', 'Helvetica Neue', sans-serif" 
        font-size="1.8"
        font-weight="300"
        letter-spacing="1.5"
        fill="#B8976A" 
        opacity="0.4"
        text-anchor="middle">sukoda.ee</text>

</svg>
