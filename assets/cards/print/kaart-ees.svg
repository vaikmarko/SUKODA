  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&amp;display=swap');
    </style>
  </defs>

  <rect width="154" height="111" fill="#FFFFFF"/>

  <!-- Just the name. Nothing else. -->
  <text x="77" y="57" 
        font-family="'Cormorant Garamond', Georgia, serif" 
        font-size="14"
        font-weight="400"
        letter-spacing="6"
        fill="#B8976A" 
        text-anchor="middle">SUKODA</text>

