<?xml version="1.0" encoding="UTF-8"?>
<!-- SUKODA Premium Kinkekaardi Ümbrik - C6 formaat
     Puhas formaat: C6 (162x114 mm) + 3mm bleed = 168x120 mm
     Paber: 120-150g premium, valge
     Trükk: Kuumfoolium kuldne logo ümbriku klapi sees
     Värviruum: CMYK | PDF
     NB! 10mm puhas ala ülemises servas (trükimasina haaramisruum)
     NB! Fondid tuleb enne PDF-i tegemist outlined'ida (Convert to Outlines)
-->
<svg width="168mm" height="120mm" viewBox="0 0 168 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&amp;family=Inter:wght@300&amp;display=swap');
    </style>
  </defs>

  <!-- Full bleed area - white -->
  <rect width="168" height="120" fill="#FFFFFF"/>

  <!-- Envelope outline (at trim edge, 3mm inside bleed) -->
  <rect x="3.5" y="3.5" width="161" height="113" fill="none" stroke="#E8E3DD" stroke-width="0.3"/>

  <!-- Flap fold line (original y=38 + 3mm bleed offset) -->
  <line x1="3" y1="41" x2="165" y2="41" stroke="#E8E3DD" stroke-width="0.2" stroke-dasharray="2,2"/>

  <!-- Flap interior - gold SUKODA logo (y=25: 22mm from trim top + 3mm bleed) -->
  <text x="84" y="25"
        font-family="'Cormorant Garamond', Georgia, serif"
        font-size="9"
        font-weight="400"
        letter-spacing="3"
        fill="#B8976A"
        text-anchor="middle">SUKODA</text>

  <!-- Bottom: website URL (y=111: 108mm from top of envelope + 3mm bleed) -->
  <text x="84" y="111"
        font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
        font-size="2"
        font-weight="300"
        letter-spacing="1.5"
        fill="#D4CFC8"
        text-anchor="middle">SUKODA.EE</text>

</svg>
