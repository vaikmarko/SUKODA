<?xml version="1.0" encoding="UTF-8"?>
<!-- SUKODA Volditav Kinkekaart - VALISPOOL
     Voldituna: 220x105 mm (DL formaat, pikk ja elegantne)
     Lahti: 440x105 mm
     Koos bleed: 446x111 mm (3mm igalt poolt)
     Voldisjoon: x=223mm
     Must taust + kuldne kuumfoolium
     Fondid: Convert to Outlines
-->
<svg width="446mm" height="111mm" viewBox="0 0 446 111" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&amp;family=Inter:wght@300&amp;display=swap');
    </style>
  </defs>

  <rect width="446" height="111" fill="#111111"/>

  <!-- Fold line (reference, remove before print) -->
  <line x1="223" y1="0" x2="223" y2="111" stroke="#333333" stroke-width="0.2" stroke-dasharray="2,2"/>

  <!-- LEFT PANEL: BACK (x=3..223, center x=113) -->
  <text x="113" y="102"
        font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
        font-size="2"
        font-weight="300"
        letter-spacing="2"
        fill="#B8976A"
        opacity="0.25"
        text-anchor="middle">SUKODA.EE</text>

  <!-- RIGHT PANEL: FRONT (x=223..443, center x=333) -->
  <text x="333" y="50"
        font-family="'Cormorant Garamond', Georgia, serif"
        font-size="14"
        font-weight="400"
        letter-spacing="8"
        fill="#B8976A"
        text-anchor="middle">SUKODA</text>

  <line x1="313" y1="60" x2="353" y2="60" stroke="#B8976A" stroke-width="0.3" opacity="0.25"/>

  <text x="333" y="72"
        font-family="'Cormorant Garamond', Georgia, serif"
        font-size="4"
        font-weight="300"
        letter-spacing="4"
        fill="#B8976A"
        opacity="0.5"
        text-anchor="middle">KINKEKAART</text>

</svg>
