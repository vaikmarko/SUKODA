<?xml version="1.0" encoding="UTF-8"?>
<!-- SUKODA Kinkekaart - Tagapool
     Puhas formaat: A6 maastik (148x105 mm) + 3mm bleed = 154x111 mm
     CMYK | PDF | 3mm bleed | Lõikemärke EI lisata
     NB! Fondid tuleb enne PDF-i tegemist outlined'ida (Convert to Outlines)
-->
<svg width="154mm" height="111mm" viewBox="0 0 154 111" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&amp;family=Inter:wght@300;400&amp;display=swap');
    </style>
  </defs>

  <rect width="154" height="111" fill="#FFFFFF"/>

  <!-- Message -->
  <text x="77" y="40" 
        font-family="'Cormorant Garamond', Georgia, serif" 
        font-size="11"
        font-weight="300"
        font-style="italic"
        fill="#B8976A" 
        text-anchor="middle">Sina v&#xE4;&#xE4;rid parimat.</text>

  <!-- Code -->
  <text x="77" y="65" 
        font-family="'Cormorant Garamond', Georgia, serif" 
        font-size="5"
        font-weight="400"
        letter-spacing="3"
        fill="#B8976A" 
        text-anchor="middle">SUKO-A7K2-M9X3</text>

  <!-- Redeem -->
  <text x="77" y="74" 
        font-family="'Inter', 'Helvetica Neue', sans-serif" 
        font-size="2.2"
        font-weight="300"
        fill="#B8976A" 
        opacity="0.6"
        text-anchor="middle">sukoda.ee/lunasta</text>

</svg>
